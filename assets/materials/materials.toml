# ==================== 按网格类型分类的材质 ====================

# Point - 点（用小圆球表示）
[materials.point_material]
type = "StandardMaterial"
base_color = [1.0, 0.8, 0.2, 1.0]  # 金黄色
perceptual_roughness = 0.3
metallic = 0.5

# Line - 线（用细圆柱表示）
[materials.line_material]
type = "StandardMaterial"
base_color = [0.2, 0.6, 1.0, 1.0]  # 天蓝色
perceptual_roughness = 0.4
metallic = 0.2

# Sphere - 球体
[materials.sphere_material]
type = "StandardMaterial"
base_color = [0.9, 0.3, 0.6, 1.0]  # 粉红色
perceptual_roughness = 0.2
metallic = 0.7

# Cylinder - 圆柱体
[materials.cylinder_material]
type = "StandardMaterial"
base_color = [0.3, 0.7, 0.9, 1.0]  # 青蓝色
perceptual_roughness = 0.3
metallic = 0.6

# Cone - 圆锥体
[materials.cone_material]
type = "StandardMaterial"
base_color = [0.8, 0.5, 0.2, 1.0]  # 橙棕色
perceptual_roughness = 0.4
metallic = 0.5

# ==================== 特殊效果材质 ====================

# 金属材质 - 高反射、低粗糙度
[materials.metal]
type = "StandardMaterial"
base_color = [0.7, 0.8, 0.9, 1.0]
metallic = 0.9
perceptual_roughness = 0.1

# 发光材质 - 自发光效果
[materials.glow]
type = "StandardMaterial"
base_color = [0.1, 0.8, 0.5, 1.0]
emissive = [0.3, 2.4, 1.5, 1.0]

# 玻璃材质 - 半透明
[materials.glass]
type = "StandardMaterial"
base_color = [0.5, 0.8, 0.9, 0.7]
alpha_mode = "Blend"
perceptual_roughness = 0.1
metallic = 0.5

# 磨砂材质 - 高粗糙度
[materials.matte]
type = "StandardMaterial"
base_color = [0.6, 0.6, 0.6, 1.0]
perceptual_roughness = 0.9
metallic = 0.0

# 塑料材质 - 中等粗糙度
[materials.plastic]
type = "StandardMaterial"
base_color = [0.9, 0.9, 0.9, 1.0]
perceptual_roughness = 0.6
metallic = 0.0

# 木材材质 - 暖色调
[materials.wood]
type = "StandardMaterial"
base_color = [0.6, 0.4, 0.2, 1.0]
perceptual_roughness = 0.8
metallic = 0.0

# ==================== 调试和测试材质 ====================

# 线框风格（用高对比度颜色模拟）
