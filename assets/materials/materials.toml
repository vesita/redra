perceptual_roughness = 0.0
metallic = 0.0

# 高亮选中状态
[materials.highlight]
type = "StandardMaterial"
base_color = [1.0, 1.0, 0.0, 1.0]  # 黄色
emissive = [1.0, 1.0, 0.0, 1.0]
perceptual_roughness = 0.2

# 禁用/不可用状态
[materials.disabled]
type = "StandardMaterial"
