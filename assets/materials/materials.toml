# 多材质配置文件
# 每个材质通过 [materials.名称] 定义
#
# Material ID 映射说明：
# 客户端可以在 Object 中使用 material_id 字段指定材质，例如：
#   - "point", "line", "sphere", "cylinder", "cone" → 根据网格类型自动选择
#   - "metal", "glass", "glow" → 特殊效果材质
#   - "axis_x", "axis_y", "axis_z" → 坐标轴颜色
#   - "red", "green", "blue", "white" → 快捷颜色
# 如果未指定 material_id，将根据网格类型自动匹配

# ==================== 基础默认材质 ====================

[materials.default]
type = "StandardMaterial"
base_color = [0.7, 0.7, 0.7, 1.0]
perceptual_roughness = 0.5
metallic = 0.0

[materials.grid]
type = "StandardMaterial"
base_color = [0.2, 0.2, 0.2, 1.0]
perceptual_roughness = 0.8
metallic = 0.0

