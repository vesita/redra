syntax = "proto3";

package formats;

// FormatPack包含各种格式化数据
message FormatPack {
  oneof data {
    Image image = 1;
    Text text = 2;
    Model model = 3;
    Audio audio = 4;
    Video video = 5;
  }
}

// Image消息用于传输图像数据
message Image {
    bytes data = 1; // 图像数据
    string mime_type = 2; // MIME类型
    uint32 width = 3; // 图像宽度
    uint32 height = 4; // 图像高度
}

// Text消息用于传输文本数据
message Text {
    string content = 1; // 文本内容
    string language = 2; // 语言类型
    string encoding = 3; // 编码方式
}

// Model消息用于传输3D模型数据
message Model {
    bytes data = 1; // 模型数据
    string format = 2; // 模型格式 (obj, gltf, fbx等)
    repeated string textures = 3; // 纹理路径列表
}

// Audio消息用于传输音频数据
message Audio {
    bytes data = 1; // 音频数据
    string format = 2; // 音频格式 (mp3, wav, flac等)
    uint32 sample_rate = 3; // 采样率
    uint32 channels = 4; // 通道数
}

// Video消息用于传输视频数据
message Video {
    bytes data = 1; // 视频数据
    string format = 2; // 视频格式 (mp4, avi, mov等)
    uint32 width = 3; // 视频宽度
    uint32 height = 4; // 视频高度
    float duration = 5; // 持续时间（秒）
}