syntax = "proto3";

package mesh;

message ExMesh {
    oneof u_mesh {
        Point point = 1;
        Line line = 2;
        Sphere sphere = 3;
        Cylinder cylinder = 4;
        Cone cone = 5;
    }
}

message Point {
    float x = 1;
    float y = 2;
    float z = 3;
}

message Line {
    Point start = 1;
    Point end = 2;
}

message Sphere {
    Point location = 1;
    float radius = 2;
}

message Cylinder {
    float radius = 1;
    float height = 2;
}

message Cone {
    float radius = 1;
    float height = 2;
}
