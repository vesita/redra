syntax = "proto3";

package target;

// TargetID定义了目标元素的唯一标识符
message TargetID {
    bool has_set = 1; // 标识是否设置了ID
    uint32 id = 2; // 实际ID值
    string uuid = 3; // 可选的UUID字符串标识
}

message ConceptionCMD {
  oneof cmd {
    TargetID id = 1;
    TargetQuery query = 2; // 查询目标
    TargetDelete delete = 3; // 删除目标
  }
}

// 查询目标的条件
message TargetQuery {
  string name = 1; // 目标名称
  repeated string tags = 2; // 目标标签
  string type = 3; // 目标类型
}

// 删除目标指令
message TargetDelete {
  TargetID id = 1; // 要删除的目标ID
  bool confirm = 2; // 是否确认删除
}