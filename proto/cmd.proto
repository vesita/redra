syntax = "proto3";

package command;

import "conception.proto";
import "designation.proto";
import "transform.proto";
import "point_cloud.proto";

// 连接控制命令
message ConnectionControl {
  string action = 1;  // "connect", "disconnect", "reconnect", "confirm"
  string session_id = 2;
}

// 心跳命令
message Heartbeat {
  int64 timestamp = 1;
  string session_id = 2;
}

// 批量命令
message BatchCmd {
  repeated Command commands = 1;
  uint32 batch_id = 2;
}

// 元数据命令
message MetaCmd {
  string key = 1;
  string value = 2;
  map<string, string> properties = 3;
}

// 宏指令，用于控制层面的消息
message MacroCmd {
  oneof macro_command {
    ConnectionControl connection_control = 1;
    Heartbeat heartbeat = 2;
    BatchCmd batch = 3;
    MetaCmd metadata = 4;
  }
}

// ============================================================================
// Command - 命令定义
// ============================================================================
// 用于对特定目标执行的各类命令的顶层封装
// 通过 oneof 实现命令类型的多态支持
// ============================================================================

// Command定义了对特定目标执行的命令
message Command {
  // 命令包类型选择器
  oneof cmd_pack {
    // 概念命令：用于目标识别和标识
    target.ConceptionCMD conception = 1;
    
    // 设计命令：用于几何形状和资源的创建与管理
    designation.DesignCMD designation = 2;
    
    // 变换命令：用于位置、旋转、缩放等空间变换
    transform.TransCMD transform = 3;
    
    // 点云数据命令：用于传输传感器点云数据
    pointcloud.PointCloudPack point_cloud = 6;
    
    // 宏指令：用于控制层面的消息
    MacroCmd macro = 7;
  }
  
  // 添加时间戳，便于追踪命令执行
  int64 timestamp = 4;
  
  // 添加命令ID，便于追踪和响应
  string command_id = 5;
}