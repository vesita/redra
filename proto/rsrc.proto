syntax = "proto3";

package resource;
import "formats.proto";
import "shape.proto";

// Resource定义了系统中可用的各种资源
message Resource {
  oneof rsrc {
    formats.FormatPack  format = 1;
    shape.ShapePack     shape = 2;
  }
  
  // 资源元数据
  string name = 3; // 资源名称
  repeated string tags = 4; // 资源标签，便于分类
  string creator = 5; // 创建者
  int64 created_at = 6; // 创建时间戳
  int64 updated_at = 7; // 更新时间戳
}