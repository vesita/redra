syntax = "proto3";

package transform;

// TransCMD定义了变换命令
message TransCMD {
    oneof trans {
      Translation translation = 1; // 平移变换
      Rotation rotation = 2; // 旋转变换
      Scale scale = 3; // 缩放变换
      Pose pose = 4; // 完整姿态变换
      Matrix matrix = 5; // 矩阵变换
    }
    
    // 变换应用选项
    TransformOptions options = 6;
}

// TransformOptions定义变换应用选项
message TransformOptions {
    bool is_relative = 1; // 是否相对变换（相对于当前位置）
    float interpolation_time = 2; // 插值时间（秒），用于动画效果
    string easing_function = 3; // 缓动函数类型
    bool preserve_scale = 4; // 是否保持缩放不变
}

// Translation定义了三维空间中的平移变换
message Translation {
  float x = 1; // X轴坐标
  float y = 2; // Y轴坐标
  float z = 3; // Z轴坐标
}

// Rotation定义了三维空间中的旋转变换（欧拉角）
message Rotation {
  float rx = 1; // 绕X轴旋转角度
  float ry = 2; // 绕Y轴旋转角度
  float rz = 3; // 绕Z轴旋转角度
}

// Scale定义了三维空间中的缩放变换
message Scale {
  float sx = 1; // X轴缩放因子
  float sy = 2; // Y轴缩放因子
  float sz = 3; // Z轴缩放因子
}

// Pose定义了完整姿态信息
message Pose {
  Translation translation = 1;
  Rotation rotation = 2;
  Scale scale = 3;
}

// Matrix定义了4x4变换矩阵
message Matrix {
  repeated float values = 1; // 矩阵值，共16个（4x4）
}