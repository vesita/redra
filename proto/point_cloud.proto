syntax = "proto3";

package pointcloud;

// ============================================================================
// PointCloud - 点云数据定义
// ============================================================================
// 用于传输传感器采集的原始点云数据
// 支持高效的批量点数据传输和帧管理
// ============================================================================

// 单个3D点
message Point3D {
  float x = 1;  // X坐标
  float y = 2;  // Y坐标
  float z = 3;  // Z坐标
}

// 点云数据包
message PointCloudPack {
  uint32 frame_id = 1;              // 帧ID，用于标识不同的帧
  uint64 timestamp = 2;             // 时间戳（毫秒）
  repeated Point3D points = 3;      // 点列表
  string source_id = 4;             // 数据源标识（可选）
  map<string, string> metadata = 5; // 元数据（可选）
}
