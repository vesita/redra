# =============================================================================
# AI 协作规则配置框架
# =============================================================================

[meta]
version = "0.0.6"
description = "AI 协作规则配置框架"
last_updated = "2026-03-27"

# -----------------------------------------------------------------------------
# 规则索引清单
# -----------------------------------------------------------------------------
# rule_order: 规则优先级（数字越小优先级越高，必填）
# mandatory: 是否强制应用（true=必须遵循，false=建议遵循）
# -----------------------------------------------------------------------------
[rule_index]
id = "rule_home"
version = "1.0.0"
category = "formatting"
tags = ["basic", "rule", "home", "main"]
author = "vesita"
review_date = "2026-03-27"
depends_on = []
optional = false

# -----------------------------------------------------------------------------
# 子规则模块索引
# -----------------------------------------------------------------------------
[sub_rules]
path = "rules/"

# -----------------------------------------------------------------------------
# 规则清单（按优先级排序）
# -----------------------------------------------------------------------------
[[sub_rules.index]]
rule_order = 1
file = "normal_language.toml"
name = "语言偏好规则"
description = "定义通信语言、技术术语处理、代码注释语言等语言相关规范"
scope_override = false  # 使用全局 scope
mandatory = true

[[sub_rules.index]]
rule_order = 2
file = "tool_chain.toml"
name = "工具链配置规则"
description = "定义开发工具、语言版本、构建命令等工具链相关配置"
scope_override = false  # 使用全局 scope
mandatory = true

[[sub_rules.index]]
rule_order = 3
file = "preference.toml"
name = "格式偏好规则"
description = "定义文档格式、代码风格、命名规范、文件组织等格式相关偏好"
scope_override = false  # 使用全局 scope
mandatory = false

# -----------------------------------------------------------------------------
# 自由规则（临时规则，灵活性补充）
# -----------------------------------------------------------------------------
[free_rules]
path = "free_rules/"
format = "markdown"
rule_order_start = 100  # 自由规则从 100 开始编号，避免与固定规则冲突

# -----------------------------------------------------------------------------
# 全局作用域（所有规则默认遵循此范围）
# -----------------------------------------------------------------------------
[global_scope]
applies_to = [
    "*.rs", 
    "*.py", 
    "*.md", 
    "*.toml", 
    "*.yaml", 
    "*.json"
]
excludes = [
    "vendor/", 
    "target/", 
    "node_modules/",
    "generated/",
    "auto_generated/",
    "**/test_data/**"
]

# -----------------------------------------------------------------------------
# 规则冲突解决策略
# -----------------------------------------------------------------------------
[conflict_resolution]
# 当语言偏好与工具链默认值冲突时，以语言偏好为准
language_overrides_toolchain_default = true

# 当格式偏好与工具链命令冲突时，以工具链为准
toolchain_overrides_format_commands = true

# 当子规则与全局 scope 冲突时：
# - scope_override=true: 使用子规则自定义 scope
# - scope_override=false: 使用全局 scope
scope_precedence = "global_first"

# 同优先级规则冲突时，终止处理并报告
same_priority_conflict_action = "abort_and_report"