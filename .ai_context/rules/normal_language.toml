# =============================================================================
# 语言偏好规则
# 优先级：1（最高）
# =============================================================================

[rule_index]
id = "lang_001"
version = "1.0.0"
rule_order = 1
category = "communication"
tags = ["language", "i18n", "documentation", "comments"]
author = "vesita"
review_date = "2026-03-27"
depends_on = []
optional = false
scope_override = false

# -----------------------------------------------------------------------------
# 基础语言配置
# -----------------------------------------------------------------------------
[basic]
primary_language = "Chinese"
secondary_language = "English"

# -----------------------------------------------------------------------------
# 技术术语处理
# -----------------------------------------------------------------------------
[technical_terms]
# 格式：英文原文 (中文解释)
format = "English(Chinese)"
keep_english_for = [
    "API", 
    "SDK", 
    "CLI", 
    "IDE", 
    "Git",
    "HTTP",
    "JSON",
    "TOML",
    "YAML"
]

# -----------------------------------------------------------------------------
# 代码注释语言
# -----------------------------------------------------------------------------
[code_comments]
rust_doc = "Chinese"
python_doc = "Chinese"
inline_comments = "Chinese"

# -----------------------------------------------------------------------------
# 例外情况（以下情况使用英文）
# -----------------------------------------------------------------------------
[exceptions]
use_english_for = [
    "error_codes",
    "log_messages_level_error",
    "log_messages_level_warn",
    "public_api_docs",
    "external_interface_definitions"
]

# -----------------------------------------------------------------------------
# 规则应用范围（使用全局 scope，此处不重复定义）
# -----------------------------------------------------------------------------
