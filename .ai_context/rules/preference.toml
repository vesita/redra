# =============================================================================
# 格式偏好规则
# 优先级：3（建议遵循）
# =============================================================================

[rule_index]
id = "fmt_001"
version = "1.0.0"
rule_order = 3
category = "formatting"
tags = ["format", "style", "naming", "organization"]
author = "vesita"
review_date = "2026-03-27"
depends_on = ["lang_001", "tool_001"]
optional = true
scope_override = false


# -----------------------------------------------------------------------------
# 文档格式
# -----------------------------------------------------------------------------
[format]
doc_format = "Markdown"
config_format = "TOML"  # 优先使用 TOML，也可接受 YAML/JSON

# -----------------------------------------------------------------------------
# 代码风格提示
# -----------------------------------------------------------------------------
[tips]
# Markdown 风格：减少不必要的警告
markdown_minimal_warnings = true

# Rust 代码：主动修复警告
rust_auto_fix_warnings = true

# Python 代码：遵循 PEP 8
python_pep8_compliant = true

# 默认情况下 AI 每次生成代码时，不需要给出文档说明
change_without_doc = true

# -----------------------------------------------------------------------------
# 命名规范
# -----------------------------------------------------------------------------
[naming_conventions]
# Rust 命名风格
rust_variables = "snake_case"
rust_structs = "PascalCase"
rust_traits = "PascalCase"
rust_functions = "snake_case"
rust_modules = "snake_case"

# Python 命名风格
python_variables = "snake_case"
python_classes = "PascalCase"
python_constants = "UPPER_CASE"
python_functions = "snake_case"
python_modules = "snake_case"

# -----------------------------------------------------------------------------
# 文件组织
# -----------------------------------------------------------------------------
[file_organization]
max_file_length_lines = 500  # 单文件最大行数建议
prefer_small_modules = true  # 优先使用小型模块化文件
one_class_per_file = false   # Rust 允许多个相关类型在同一文件

# -----------------------------------------------------------------------------
# 格式化配置引用
# -----------------------------------------------------------------------------
[external_configs]
rust_formatter = ".rustfmt.toml"
python_formatter = "pyproject.toml"
markdown_linter = ".markdownlint.json"

# -----------------------------------------------------------------------------
# 规则应用范围（使用全局 scope，此处不重复定义）
# -----------------------------------------------------------------------------
